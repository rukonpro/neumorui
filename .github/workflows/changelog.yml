name: Generate Changelog

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          echo "# Changelog — $CURRENT_TAG" > CHANGELOG_NEW.md
          echo "" >> CHANGELOG_NEW.md
          echo "## What's Changed" >> CHANGELOG_NEW.md
          echo "" >> CHANGELOG_NEW.md

          if [ -n "$PREV_TAG" ]; then
            # Features
            FEATS=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --grep="^feat" 2>/dev/null)
            if [ -n "$FEATS" ]; then
              echo "### Features" >> CHANGELOG_NEW.md
              echo "$FEATS" >> CHANGELOG_NEW.md
              echo "" >> CHANGELOG_NEW.md
            fi

            # Fixes
            FIXES=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --grep="^fix" 2>/dev/null)
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes" >> CHANGELOG_NEW.md
              echo "$FIXES" >> CHANGELOG_NEW.md
              echo "" >> CHANGELOG_NEW.md
            fi

            # Performance
            PERFS=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --grep="^perf" 2>/dev/null)
            if [ -n "$PERFS" ]; then
              echo "### Performance" >> CHANGELOG_NEW.md
              echo "$PERFS" >> CHANGELOG_NEW.md
              echo "" >> CHANGELOG_NEW.md
            fi

            # Other
            OTHERS=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --grep="^docs\|^chore\|^test\|^style" 2>/dev/null)
            if [ -n "$OTHERS" ]; then
              echo "### Other" >> CHANGELOG_NEW.md
              echo "$OTHERS" >> CHANGELOG_NEW.md
              echo "" >> CHANGELOG_NEW.md
            fi
          else
            git log --pretty=format:"- %s" >> CHANGELOG_NEW.md
          fi

          # Prepend to existing CHANGELOG
          if [ -f CHANGELOG.md ]; then
            echo "" >> CHANGELOG_NEW.md
            echo "---" >> CHANGELOG_NEW.md
            echo "" >> CHANGELOG_NEW.md
            cat CHANGELOG.md >> CHANGELOG_NEW.md
          fi
          mv CHANGELOG_NEW.md CHANGELOG.md

      - name: Commit Changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: auto-generate changelog for ${GITHUB_REF#refs/tags/} [skip ci]" || true
          git push origin HEAD:master || true
